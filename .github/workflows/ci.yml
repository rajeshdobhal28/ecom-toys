name: CI

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master", "dev" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontendv2/package-lock.json'

    - name: Install dependencies
      run: npm ci
      working-directory: frontendv2

    - name: Run tests
      run: npm test
      working-directory: frontendv2
